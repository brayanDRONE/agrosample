services:
  # Backend Django
  - type: web
    name: agrosample-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt && python manage.py collectstatic --no-input --clear"
    startCommand: "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: agrosample-db
          property: connectionString

  # Frontend Vite
  - type: web
    name: agrosample-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm install -g serve && serve -s dist -l 3000"
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: agrosample-db
    plan: free
    databaseName: agrosample_production
    user: agrosample_user
