[phases.setup]
nixPkgs = ["python311", "postgresql"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r backend/requirements.txt"
]

[phases.build]
cmds = [
    "python backend/manage.py collectstatic --no-input"
]

[start]
cmd = "python backend/manage.py migrate && gunicorn --chdir backend config.wsgi:application --bind 0.0.0.0:$PORT"
